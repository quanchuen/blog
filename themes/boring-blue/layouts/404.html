{{ define "main" }}
<div class="error-page">
  <h1 style="font-size:4rem;font-weight:900;margin-bottom:1rem;">404</h1>
  <p style="font-size:1.2rem;color:var(--muted);margin-bottom:2rem;">This page doesn't exist. How boring.</p>
  <a href="{{ .Site.Home.RelPermalink }}" style="padding:0.5rem 1.25rem;background:var(--accent);color:white;border:3px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);text-decoration:none;font-weight:700;">Go Home</a>
</div>
{{ end }}
